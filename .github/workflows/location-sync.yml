name: Location Sync to Notion
on:
  repository_dispatch:
    types: [location-sync]
  workflow_dispatch:
    inputs:
      location:
        description: 'Location string'
        required: true
        default: ''

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Parse location and sync to Notion
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        run: |
          RAW_LOCATION='${{ github.event.client_payload.location || inputs.location }}'
          
          # 从 JSON 中提取 location 值
          LOCATION=$(echo "$RAW_LOCATION" | sed 's/.*"location":"\([^"]*\)".*/\1/' | sed 's/\\n/ /g' | sed 's/\\r/ /g' | tr '\n' ' ' | tr '\r' ' ')
          
          # 清理多余空格
          LOCATION=$(echo "$LOCATION" | sed 's/  */ /g' | sed 's/^ *//' | sed 's/ *$//')
          
          # 截断过长的位置信息
          LOCATION=$(echo "$LOCATION" | cut -c1-1900)
          
          # 提取城市
          CITY=$(echo "$LOCATION" | grep -oE '[^ ]+市' | head -1 | sed 's/市$//')
          
          if [ -z "$CITY" ]; then
            CITY=$(echo "$LOCATION" | grep -oE '深圳|北京|上海|广州|杭州|成都|武汉|南京|苏州|天津|重庆|西安|厦门|青岛|大连|宁波|无锡|长沙|郑州|东莞|佛山|福州|合肥|济南|昆明|南昌|南宁|贵阳|海口|兰州|石家庄|太原|沈阳|长春|哈尔滨' | head -1)
          fi
          
          [ -z "$CITY" ] && CITY="未知"
          
          # 提取国家
          COUNTRY=""
          if echo "$LOCATION" | grep -q "中国"; then
            COUNTRY="中国"
          elif echo "$LOCATION" | grep -qi "china"; then
            COUNTRY="中国"
          else
            COUNTRY=$(echo "$LOCATION" | grep -oE '日本|韩国|美国|英国|法国|德国|意大利|西班牙|加拿大|澳大利亚|新加坡|马来西亚|泰国|越南|印度' | head -1)
          fi
          
          [ -z "$COUNTRY" ] && COUNTRY="未知"
          
          # 提取简略位置
          BRIEF_LOCATION="$LOCATION"
          
          if [ "$COUNTRY" != "未知" ]; then
            BRIEF_LOCATION=$(echo "$BRIEF_LOCATION" | sed "s/$COUNTRY//g")
          fi
          
          BRIEF_LOCATION=$(echo "$BRIEF_LOCATION" | sed 's/[^ ]*省//g')
          BRIEF_LOCATION=$(echo "$BRIEF_LOCATION" | sed 's/[^ ]*市//g')
          BRIEF_LOCATION=$(echo "$BRIEF_LOCATION" | sed 's/  */ /g' | sed 's/^ *//' | sed 's/ *$//')
          BRIEF_LOCATION=$(echo "$BRIEF_LOCATION" | cut -c1-1900)
          
          # 查询Notion最新记录，检查是否重复
          LAST_LOCATION=$(curl -s -X POST "https://api.notion.com/v1/databases/${NOTION_DATABASE_ID}/query" \
            -H "Authorization: Bearer ${NOTION_TOKEN}" \
            -H "Notion-Version: 2022-06-28" \
            -H "Content-Type: application/json" \
            -d '{"page_size": 1, "sorts": [{"timestamp": "created_time", "direction": "descending"}]}' | grep -oP '(?<="plain_text":")[^"]*' | head -1)
          
          if [ "$LOCATION" = "$LAST_LOCATION" ]; then
            echo "位置未变化，跳过记录"
            exit 0
          fi
          
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%S")
          
          # 写入临时文件
          cat > /tmp/payload.json << EOF
          {
            "parent": { "database_id": "${NOTION_DATABASE_ID}" },
            "properties": {
              "时间": { "date": { "start": "$TIMESTAMP" } },
              "位置": { "rich_text": [{ "text": { "content": "$LOCATION" } }] },
              "简略位置": { "rich_text": [{ "text": { "content": "$BRIEF_LOCATION" } }] },
              "城市": { "select": { "name": "$CITY" } },
              "国家": { "select": { "name": "$COUNTRY" } }
            }
          }
          EOF
          
          # 同步到Notion，输出重定向到/dev/null
          curl -s -X POST "https://api.notion.com/v1/pages" \
            -H "Authorization: Bearer ${NOTION_TOKEN}" \
            -H "Notion-Version: 2022-06-28" \
            -H "Content-Type: application/json" \
            -d @/tmp/payload.json > /dev/null 2>&1
          
          echo "同步完成"
