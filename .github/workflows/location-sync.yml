name: Location Sync
on:
  workflow_dispatch:
    inputs:
      location:
        description: '位置信息'
        required: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Sync to Notion
        env:
          RAW_LOCATION: ${{ github.event.inputs.location }}
        run: |
          # 从 JSON 中提取 location 值
          LOCATION=$(echo "$RAW_LOCATION" | sed 's/.*"location":"\([^"]*\)".*/\1/' | tr '\n' ' ' | tr '\r' ' ')
          # 截断过长的位置信息
          LOCATION=$(echo "$LOCATION" | cut -c1-1900)
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%S")
          # 解析城市
          CITY=$(echo "$LOCATION" | grep -oE '北京|上海|广州|深圳|杭州|南京|成都|武汉|西安|重庆|天津|苏州|厦门|青岛|大连|宁波|无锡|长沙|郑州|东莞|佛山|福州|哈尔滨|沈阳|济南|昆明|南宁|太原|南昌|贵阳|兰州|海口|三亚|珠海|中山|惠州|常州|烟台|绍兴|嘉兴|金华|汕头|湛江|江门|茂名|梅州|阳江|韶关|潮州|云浮|汕尾' | head -1)
          [ -z "$CITY" ] && CITY="未知"
          # 写入临时文件避免 JSON 转义问题
          cat > /tmp/payload.json << EOF
          {
            "parent": {
              "database_id": "${{ secrets.NOTION_DATABASE_ID }}"
            },
            "properties": {
              "时间": {
                "date": {
                  "start": "$TIMESTAMP"
                }
              },
              "位置": {
                "rich_text": [{
                  "text": {
                    "content": "$LOCATION"
                  }
                }]
              },
              "城市": {
                "select": {
                  "name": "$CITY"
                }
              }
            }
          }
          EOF
          curl -X POST "https://api.notion.com/v1/pages" \
            -H "Authorization: Bearer ${{ secrets.NOTION_TOKEN }}" \
            -H "Notion-Version: 2022-06-28" \
            -H "Content-Type: application/json" \
            -d @/tmp/payload.json
          echo "已同步: $LOCATION -> $CITY"
