name: Location Sync to Notion
on:
  repository_dispatch:
    types: [location-sync]
  workflow_dispatch:
    inputs:
      location:
        description: 'Location string'
        required: true
        default: ''

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Parse location and sync to Notion
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        run: |
          RAW_INPUT='${{ github.event.client_payload.location || inputs.location }}'
          
          # 从JSON中提取location字段值
          LOCATION=$(echo "$RAW_INPUT" | grep -oP '(?<="location":")[^"]*' | sed 's/\\n/ /g' | sed 's/\\r/ /g' | tr '\n' ' ' | tr '\r' ' ')
          
          # 如果提取失败，直接用原始输入
          if [ -z "$LOCATION" ]; then
            LOCATION=$(echo "$RAW_INPUT" | sed 's/\\n/ /g' | sed 's/\\r/ /g' | tr '\n' ' ' | tr '\r' ' ')
          fi
          
          # 清理多余空格
          LOCATION=$(echo "$LOCATION" | sed 's/  */ /g' | sed 's/^ *//' | sed 's/ *$//')
          
          # 提取城市（优先匹配"XX市"格式）
          CITY=$(echo "$LOCATION" | grep -oE '[^ ]+市' | head -1 | sed 's/市$//')
          
          # 如果没找到，尝试匹配常见中文城市名
          if [ -z "$CITY" ]; then
            CITY=$(echo "$LOCATION" | grep -oE '深圳|北京|上海|广州|杭州|成都|武汉|南京|苏州|天津|重庆|西安|厦门|青岛|大连|宁波|无锡|长沙|郑州|东莞|佛山|福州|合肥|济南|昆明|南昌|南宁|贵阳|海口|兰州|石家庄|太原|沈阳|长春|哈尔滨' | head -1)
          fi
          
          # 提取国家
          COUNTRY=""
          if echo "$LOCATION" | grep -q "中国"; then
            COUNTRY="中国"
          elif echo "$LOCATION" | grep -qi "china"; then
            COUNTRY="中国"
          else
            COUNTRY=$(echo "$LOCATION" | grep -oE '日本|韩国|美国|英国|法国|德国|意大利|西班牙|加拿大|澳大利亚|新加坡|马来西亚|泰国|越南|印度' | head -1)
            if [ -z "$COUNTRY" ]; then
              ENG_COUNTRY=$(echo "$LOCATION" | grep -oEi 'Japan|Korea|USA|United States|UK|France|Germany|Italy|Spain|Canada|Australia|Singapore|Malaysia|Thailand|Vietnam|India' | head -1)
              case "$ENG_COUNTRY" in
                Japan) COUNTRY="日本" ;;
                Korea) COUNTRY="韩国" ;;
                USA|United\ States) COUNTRY="美国" ;;
                UK) COUNTRY="英国" ;;
                France) COUNTRY="法国" ;;
                Germany) COUNTRY="德国" ;;
                Italy) COUNTRY="意大利" ;;
                Spain) COUNTRY="西班牙" ;;
                Canada) COUNTRY="加拿大" ;;
                Australia) COUNTRY="澳大利亚" ;;
                Singapore) COUNTRY="新加坡" ;;
                Malaysia) COUNTRY="马来西亚" ;;
                Thailand) COUNTRY="泰国" ;;
                Vietnam) COUNTRY="越南" ;;
                India) COUNTRY="印度" ;;
              esac
            fi
          fi
          
          # 提取简略位置（去掉国家和省市区）
          BRIEF_LOCATION="$LOCATION"
          
          # 去掉国家
          if [ -n "$COUNTRY" ]; then
            BRIEF_LOCATION=$(echo "$BRIEF_LOCATION" | sed "s/$COUNTRY//g")
          fi
          
          # 去掉省份（XX省格式）
          BRIEF_LOCATION=$(echo "$BRIEF_LOCATION" | sed 's/[^ ]*省//g')
          
          # 去掉城市（XX市格式）
          BRIEF_LOCATION=$(echo "$BRIEF_LOCATION" | sed 's/[^ ]*市//g')
          
          # 清理多余空格
          BRIEF_LOCATION=$(echo "$BRIEF_LOCATION" | sed 's/  */ /g' | sed 's/^ *//' | sed 's/ *$//')
          
          # 去重：查询Notion最后一条记录（按创建时间倒序）
          LAST_RECORD=$(curl -s -X POST "https://api.notion.com/v1/databases/${NOTION_DATABASE_ID}/query" \
            -H "Authorization: Bearer ${NOTION_TOKEN}" \
            -H "Notion-Version: 2022-06-28" \
            -H "Content-Type: application/json" \
            -d '{"page_size":1,"sorts":[{"timestamp":"created_time","direction":"descending"}]}')
          
          # 使用python3一行命令提取位置
          LAST_LOCATION=$(echo "$LAST_RECORD" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          if d.get('results'):
              props = d['results'][0]['properties']
              loc = props.get('位置', {}).get('rich_text', [])
              if loc:
                  print(loc[0].get('text', {}).get('content', ''))
          " 2>/dev/null)
          
          # 清理LAST_LOCATION
          LAST_LOCATION=$(echo "$LAST_LOCATION" | tr '\n' ' ' | tr '\r' ' ' | sed 's/  */ /g' | sed 's/^ *//' | sed 's/ *$//')
          
          # 如果位置相同，跳过
          if [ "$LAST_LOCATION" = "$LOCATION" ]; then
            echo "位置重复，跳过记录: $LOCATION"
            exit 0
          fi
          
          echo "新位置: $LOCATION (上次: $LAST_LOCATION)"
          
          # 获取当前时间
          CURRENT_TIME=$(date -u +"%Y-%m-%dT%H:%M:%S.000Z")
          
          # 同步到 Notion（添加位置图标📍）
          LOCATION_ESCAPED=$(echo "$LOCATION" | sed 's/"/\\"/g')
          BRIEF_ESCAPED=$(echo "$BRIEF_LOCATION" | sed 's/"/\\"/g')
          
          RESPONSE=$(curl -s -X POST "https://api.notion.com/v1/pages" \
            -H "Authorization: Bearer ${NOTION_TOKEN}" \
            -H "Notion-Version: 2022-06-28" \
            -H "Content-Type: application/json" \
            -d "{
              \"parent\": {\"database_id\": \"${NOTION_DATABASE_ID}\"},
              \"icon\": {\"type\": \"emoji\", \"emoji\": \"📍\"},
              \"properties\": {
                \"时间\": {\"date\": {\"start\": \"${CURRENT_TIME}\"}},
                \"位置\": {\"rich_text\": [{\"text\": {\"content\": \"${LOCATION_ESCAPED}\"}}]},
                \"简略位置\": {\"rich_text\": [{\"text\": {\"content\": \"${BRIEF_ESCAPED}\"}}]},
                \"城市\": {\"select\": {\"name\": \"${CITY}\"}},
                \"国家\": {\"select\": {\"name\": \"${COUNTRY}\"}}
              }
            }")
          
          echo "已同步: $LOCATION -> 简略: $BRIEF_LOCATION, 城市: $CITY, 国家: $COUNTRY"
