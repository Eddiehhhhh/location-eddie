name: Location Sync to Notion
on:
  repository_dispatch:
    types: [location-sync]
  workflow_dispatch:
    inputs:
      location:
        description: 'Location string'
        required: true
        default: ''

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Parse location and sync to Notion
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        run: |
          RAW_LOCATION='${{ github.event.client_payload.location || inputs.location }}'
          
          # 清理位置字符串（处理换行符）
          LOCATION=$(echo "$RAW_LOCATION" | sed 's/\\n/ /g' | sed 's/\\r/ /g' | tr '\n' ' ' | tr '\r' ' ')
          
          echo "原始位置: $LOCATION"
          
          # 提取城市（优先匹配"XX市"格式）
          CITY=$(echo "$LOCATION" | grep -oE '[^ ]+市' | head -1 | sed 's/市$//')
          
          # 如果没找到，尝试匹配常见中文城市名
          if [ -z "$CITY" ]; then
            CITY=$(echo "$LOCATION" | grep -oE '深圳|北京|上海|广州|杭州|成都|武汉|南京|苏州|天津|重庆|西安|厦门|青岛|大连|宁波|无锡|长沙|郑州|东莞|佛山|福州|合肥|济南|昆明|南昌|南宁|贵阳|海口|兰州|石家庄|太原|沈阳|长春|哈尔滨' | head -1)
          fi
          
          echo "提取的城市: $CITY"
          
          # 提取国家
          COUNTRY=""
          if echo "$LOCATION" | grep -q "中国"; then
            COUNTRY="中国"
          elif echo "$LOCATION" | grep -qi "china"; then
            COUNTRY="中国"
          else
            COUNTRY=$(echo "$LOCATION" | grep -oE '日本|韩国|美国|英国|法国|德国|意大利|西班牙|加拿大|澳大利亚|新加坡|马来西亚|泰国|越南|印度' | head -1)
            if [ -z "$COUNTRY" ]; then
              COUNTRY=$(echo "$LOCATION" | grep -oEi 'Japan|Korea|USA|United States|UK|France|Germany|Italy|Spain|Canada|Australia|Singapore|Malaysia|Thailand|Vietnam|India' | head -1)
              case "$COUNTRY" in
                Japan) COUNTRY="日本" ;;
                Korea) COUNTRY="韩国" ;;
                USA|United\ States) COUNTRY="美国" ;;
                UK) COUNTRY="英国" ;;
                France) COUNTRY="法国" ;;
                Germany) COUNTRY="德国" ;;
                Italy) COUNTRY="意大利" ;;
                Spain) COUNTRY="西班牙" ;;
                Canada) COUNTRY="加拿大" ;;
